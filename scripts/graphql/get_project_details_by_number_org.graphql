query GetOrgProjectDetailsByNumber($org: String!, $project_number: Int!) {
  organization(login: $org) {
    projectV2(number: $project_number) {
      id
      title
      shortDescription
      readme
      latestStatusUpdate: items(first: 1, orderBy: {field: UPDATED_AT, direction: DESC}) {
        nodes {
          ... on ProjectV2Item {
            status: fieldValueByName(name: "Status") {
              ... on ProjectV2ItemFieldSingleSelectValue {
                name
              }
            }
            startDate: fieldValueByName(name: "Start date") {
              ... on ProjectV2ItemFieldDateValue {
                date
              }
            }
            targetDate: fieldValueByName(name: "Target date") {
              ... on ProjectV2ItemFieldDateValue {
                date
              }
            }
          }
        }
      }
    }
  }
}
